name: Deploy to Dev (Hostinger)

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy → development
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo, pdo_mysql, zip, intl, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Create temporary .env for artisan boot
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Publish theme assets (per-theme public copy)
        run: |
          for dir in resources/themes/*/; do
            slug=$(basename "$dir")
            php artisan themes:publish-assets "$slug" || true
          done

      - name: Remove temporary .env before deploy
        run: rm -f .env

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Setup SSH key
        run: |
          # Use printf (not echo) — printf preserves the trailing newline
          # that OpenSSH requires at end-of-file, and won't interpret backslashes.
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Verify SSH key is valid (derives public key — safe to log)
        run: |
          echo "Key file line count: $(wc -l < ~/.ssh/deploy_key)"
          echo "First line: $(head -n1 ~/.ssh/deploy_key)"
          echo "Last line:  $(tail -n1 ~/.ssh/deploy_key)"
          echo "--- Derived public key (must match what's on Hostinger): ---"
          ssh-keygen -y -f ~/.ssh/deploy_key || (echo "❌ Private key is malformed — re-paste with newlines intact"; exit 1)

      - name: Test SSH connection (verbose)
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -v \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo OK from $(hostname)" 2>&1 | tail -30

      # DEV_DEPLOY_PATH = /home/u778058510/domains/codie.my.id/public_html/marrivitation
      # (parent folder of Laravel's public/ — document root is .../marrivitation/public)
      - name: Sync files to dev server via rsync
        run: |
          rsync -az --checksum --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/logs/*.log' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/app/public/*' \
            --exclude='public/storage' \
            --exclude='.claude' \
            --exclude='boost.json' \
            --exclude='.mcp.json' \
            --exclude='database/*.sqlite' \
            --exclude='phpunit.xml' \
            --exclude='playwright.config.*' \
            --exclude='test-results' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.DEV_DEPLOY_PATH }}/

      - name: Run post-deploy commands on dev
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEV_DEPLOY_PATH }}

            # Hostinger shared CLI runs OUTSIDE CageFS, so user-selected
            # extensions don't auto-load — even ones that work in FPM.
            # Workaround: invoke Alt-PHP binary directly and load each
            # required `.so` via `-dextension=...` flags. The .so files
            # exist at /opt/alt/php84/usr/lib64/php/modules/.
            PHP_BIN=/opt/alt/php84/usr/bin/php
            EXT_DIR=/opt/alt/php84/usr/lib64/php/modules

            # Sanity: ensure binary + critical .so files exist
            if [ ! -x "$PHP_BIN" ]; then
              echo "❌ PHP binary not found at $PHP_BIN"
              exit 1
            fi
            for ext in dom pdo pdo_mysql mbstring bcmath intl zip fileinfo phar mysqli gd xmlreader xmlwriter; do
              if [ ! -f "$EXT_DIR/$ext.so" ]; then
                echo "❌ Missing extension file: $EXT_DIR/$ext.so"
                exit 1
              fi
            done

            # Flag string passed to every PHP invocation
            PHP_EXT_FLAGS="-dextension=$EXT_DIR/dom.so \
              -dextension=$EXT_DIR/pdo.so \
              -dextension=$EXT_DIR/pdo_mysql.so \
              -dextension=$EXT_DIR/mbstring.so \
              -dextension=$EXT_DIR/bcmath.so \
              -dextension=$EXT_DIR/intl.so \
              -dextension=$EXT_DIR/zip.so \
              -dextension=$EXT_DIR/fileinfo.so \
              -dextension=$EXT_DIR/phar.so \
              -dextension=$EXT_DIR/mysqli.so \
              -dextension=$EXT_DIR/gd.so \
              -dextension=$EXT_DIR/xmlreader.so \
              -dextension=$EXT_DIR/xmlwriter.so"

            echo "✅ Using PHP: $PHP_BIN"
            "$PHP_BIN" $PHP_EXT_FLAGS -v
            echo "Extensions verified:"
            "$PHP_BIN" $PHP_EXT_FLAGS -r 'foreach (["dom","pdo","pdo_mysql","mbstring","bcmath","intl","zip","fileinfo","phar","mysqli","gd"] as $e) echo "  $e=".(int)extension_loaded($e).PHP_EOL;'

            chmod -R 775 storage bootstrap/cache
            mkdir -p storage/framework/sessions storage/framework/cache storage/framework/views storage/app/public
            "$PHP_BIN" $PHP_EXT_FLAGS artisan storage:link --force 2>/dev/null || true

            "$PHP_BIN" $PHP_EXT_FLAGS artisan migrate --force --no-interaction

            "$PHP_BIN" $PHP_EXT_FLAGS artisan config:clear
            "$PHP_BIN" $PHP_EXT_FLAGS artisan route:clear
            "$PHP_BIN" $PHP_EXT_FLAGS artisan view:clear
            "$PHP_BIN" $PHP_EXT_FLAGS artisan config:cache
            "$PHP_BIN" $PHP_EXT_FLAGS artisan route:cache
            "$PHP_BIN" $PHP_EXT_FLAGS artisan view:cache

            "$PHP_BIN" $PHP_EXT_FLAGS artisan queue:restart 2>/dev/null || true

            echo "✅ Deploy DEV selesai — $(date '+%Y-%m-%d %H:%M:%S WIB')"
