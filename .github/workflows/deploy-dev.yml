name: Deploy to Dev (Hostinger)

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy → development
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo, pdo_mysql, zip, intl, gd
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Create temporary .env for artisan boot
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Publish theme assets (per-theme public copy)
        run: |
          for dir in resources/themes/*/; do
            slug=$(basename "$dir")
            php artisan themes:publish-assets "$slug" || true
          done

      - name: Remove temporary .env before deploy
        run: rm -f .env

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Setup SSH key
        run: |
          # Use printf (not echo) — printf preserves the trailing newline
          # that OpenSSH requires at end-of-file, and won't interpret backslashes.
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Verify SSH key is valid (derives public key — safe to log)
        run: |
          echo "Key file line count: $(wc -l < ~/.ssh/deploy_key)"
          echo "First line: $(head -n1 ~/.ssh/deploy_key)"
          echo "Last line:  $(tail -n1 ~/.ssh/deploy_key)"
          echo "--- Derived public key (must match what's on Hostinger): ---"
          ssh-keygen -y -f ~/.ssh/deploy_key || (echo "❌ Private key is malformed — re-paste with newlines intact"; exit 1)

      - name: Test SSH connection (verbose)
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -v \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo OK from $(hostname)" 2>&1 | tail -30

      # DEV_DEPLOY_PATH = /home/u778058510/domains/codie.my.id/public_html/marrivitation
      # (parent folder of Laravel's public/ — document root is .../marrivitation/public)
      - name: Sync files to dev server via rsync
        run: |
          rsync -az --checksum --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/logs/*.log' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/app/public/*' \
            --exclude='public/storage' \
            --exclude='.claude' \
            --exclude='boost.json' \
            --exclude='.mcp.json' \
            --exclude='database/*.sqlite' \
            --exclude='phpunit.xml' \
            --exclude='playwright.config.*' \
            --exclude='test-results' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.DEV_DEPLOY_PATH }}/

      - name: Run post-deploy commands on dev
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEV_DEPLOY_PATH }}

            # Hostinger shared hosting ships multiple PHP CLI binaries with
            # different extension sets. The default `php` is often a minimal
            # build missing dom/pdo. Find one that has the extensions Laravel
            # needs and use that explicitly for all artisan commands.
            PHP_BIN=""
            CANDIDATES="
              /usr/bin/php8.5 /opt/alt/php85/usr/bin/php /usr/local/bin/php8.5 php8.5 php85
              /usr/bin/php8.4 /opt/alt/php84/usr/bin/php /usr/local/bin/php8.4 php8.4 php84
              /usr/bin/php8.3 /opt/alt/php83/usr/bin/php /usr/local/bin/php8.3 php8.3 php83
              php
            "
            for candidate in $CANDIDATES; do
              if command -v "$candidate" > /dev/null 2>&1; then
                if "$candidate" -r 'exit((extension_loaded("dom") && extension_loaded("pdo") && extension_loaded("pdo_mysql")) ? 0 : 1);' > /dev/null 2>&1; then
                  PHP_BIN="$candidate"
                  break
                fi
              fi
            done

            if [ -z "$PHP_BIN" ]; then
              echo "❌ No PHP binary with dom + pdo + pdo_mysql extensions found on server"
              echo "--- Diagnostic ---"
              echo "PATH: $PATH"
              echo "Candidates probed:"
              for candidate in $CANDIDATES; do
                if command -v "$candidate" > /dev/null 2>&1; then
                  binpath=$(command -v "$candidate")
                  ver=$("$candidate" -r 'echo PHP_VERSION;' 2>/dev/null || echo "?")
                  exts=$("$candidate" -r 'echo "dom=".(int)extension_loaded("dom")." pdo=".(int)extension_loaded("pdo")." pdo_mysql=".(int)extension_loaded("pdo_mysql");' 2>/dev/null || echo "boot failed")
                  echo "  $candidate → $binpath (PHP $ver) [$exts]"
                fi
              done
              echo "--- Also try checking these manually via SSH: ---"
              echo "  ls /opt/cpanel/ea-php*/root/usr/bin/php 2>/dev/null"
              echo "  ls /usr/local/php*/bin/php 2>/dev/null"
              exit 1
            fi

            echo "✅ Using PHP binary: $PHP_BIN"
            "$PHP_BIN" -v

            chmod -R 775 storage bootstrap/cache
            mkdir -p storage/framework/sessions storage/framework/cache storage/framework/views storage/app/public
            "$PHP_BIN" artisan storage:link --force 2>/dev/null || true

            "$PHP_BIN" artisan migrate --force --no-interaction

            "$PHP_BIN" artisan config:clear
            "$PHP_BIN" artisan route:clear
            "$PHP_BIN" artisan view:clear
            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache
            "$PHP_BIN" artisan view:cache

            "$PHP_BIN" artisan queue:restart 2>/dev/null || true

            echo "✅ Deploy DEV selesai — $(date '+%Y-%m-%d %H:%M:%S WIB')"
